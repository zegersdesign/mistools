<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Libre Tracker - Dashboard Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuración de la API
        const API_BASE = 'http://localhost:5000/api';

        // Hook personalizado para fetch de datos
        function useApi(endpoint, autoLoad = true) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const fetchData = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`${API_BASE}${endpoint}`);
                    const json = await response.json();
                    if (json.success) {
                        setData(json.data);
                    } else {
                        setError(json.error || 'Error desconocido');
                    }
                } catch (err) {
                    setError('Error de conexión con el servidor');
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (autoLoad) {
                    fetchData();
                }
            }, [endpoint]);

            return { data, loading, error, refetch: fetchData };
        }

        // Componente principal del Dashboard
        function Dashboard() {
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [filter, setFilter] = useState('all');
            const [sortBy, setSortBy] = useState('recent');
            const [addUrlModal, setAddUrlModal] = useState(false);

            const { data: products, loading: loadingProducts, refetch: refetchProducts } = useApi('/products');
            const { data: alerts, loading: loadingAlerts } = useApi('/alerts');
            const { data: stats, loading: loadingStats } = useApi('/stats');

            const filteredProducts = products ? products.filter(p => {
                if (filter === 'all') return true;
                if (filter === 'discounts') return p.discount_percentage > 0;
                if (filter === 'stock') return p.stock_available;
                if (filter === 'no_stock') return !p.stock_available;
                return true;
            }) : [];

            const sortedProducts = [...filteredProducts].sort((a, b) => {
                if (sortBy === 'price_low') return a.price - b.price;
                if (sortBy === 'price_high') return b.price - a.price;
                if (sortBy === 'discount') return (b.discount_percentage || 0) - (a.discount_percentage || 0);
                return 0;
            });

            const handleTrackNow = async () => {
                try {
                    const response = await fetch(`${API_BASE}/track-now`, {
                        method: 'POST'
                    });
                    const json = await response.json();
                    if (json.success) {
                        alert('✅ Tracking completado exitosamente');
                        refetchProducts();
                    } else {
                        alert('❌ Error: ' + json.error);
                    }
                } catch (err) {
                    alert('❌ Error de conexión');
                }
            };

            if (loadingProducts && !products) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="text-center">
                            <div className="loading-spinner mx-auto mb-4"></div>
                            <p className="text-white text-xl">Cargando datos...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto">
                    {/* Header */}
                    <div className="glass-card p-6 mb-6">
                        <div className="flex items-center justify-between flex-wrap gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-800 mb-2">
                                    📊 Mercado Libre Tracker Pro
                                </h1>
                                <p className="text-gray-600">
                                    Monitoreo inteligente de precios en tiempo real
                                </p>
                            </div>
                            <div className="flex gap-3">
                                <button
                                    onClick={() => setAddUrlModal(true)}
                                    className="bg-green-500 text-white px-6 py-3 rounded-lg hover:bg-green-600 transition-all font-medium"
                                >
                                    ➕ Agregar Producto
                                </button>
                                <button
                                    onClick={handleTrackNow}
                                    className="bg-gradient-to-r from-blue-500 to-purple-600 text-white px-6 py-3 rounded-lg hover:shadow-lg transition-all font-medium"
                                >
                                    🔄 Actualizar Ahora
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Stats Cards */}
                    {stats && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            <StatsCard
                                icon="🛍️"
                                title="Productos"
                                value={stats.total_products}
                                color="blue"
                            />
                            <StatsCard
                                icon="💰"
                                title="Con Descuento"
                                value={stats.with_discount}
                                color="green"
                            />
                            <StatsCard
                                icon="📦"
                                title="Sin Stock"
                                value={stats.out_of_stock}
                                color="red"
                            />
                            <StatsCard
                                icon="🚨"
                                title="Alertas (7d)"
                                value={stats.recent_alerts}
                                color="orange"
                                pulse={stats.recent_alerts > 0}
                            />
                        </div>
                    )}

                    {/* Alerts Section */}
                    {alerts && alerts.length > 0 && (
                        <div className="glass-card p-6 mb-6">
                            <h2 className="text-xl font-bold text-gray-800 mb-4">🔔 Alertas Recientes</h2>
                            <div className="space-y-3">
                                {alerts.slice(0, 5).map(alert => (
                                    <Alert key={alert.id} alert={alert} />
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Filters and Sort */}
                    <div className="glass-card p-4 mb-6">
                        <div className="flex flex-wrap gap-4 items-center">
                            <div className="flex gap-2 flex-wrap">
                                <FilterButton
                                    active={filter === 'all'}
                                    onClick={() => setFilter('all')}
                                    label={`Todos (${products?.length || 0})`}
                                />
                                <FilterButton
                                    active={filter === 'discounts'}
                                    onClick={() => setFilter('discounts')}
                                    label="Con Descuento"
                                />
                                <FilterButton
                                    active={filter === 'stock'}
                                    onClick={() => setFilter('stock')}
                                    label="En Stock"
                                />
                                <FilterButton
                                    active={filter === 'no_stock'}
                                    onClick={() => setFilter('no_stock')}
                                    label="Sin Stock"
                                />
                            </div>
                            <div className="ml-auto">
                                <select
                                    value={sortBy}
                                    onChange={(e) => setSortBy(e.target.value)}
                                    className="px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500"
                                >
                                    <option value="recent">Más recientes</option>
                                    <option value="price_low">Precio: menor a mayor</option>
                                    <option value="price_high">Precio: mayor a menor</option>
                                    <option value="discount">Mayor descuento</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Products Grid */}
                    {sortedProducts.length > 0 ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                            {sortedProducts.map(product => (
                                <ProductCard
                                    key={product.id}
                                    product={product}
                                    onSelect={() => setSelectedProduct(product)}
                                />
                            ))}
                        </div>
                    ) : (
                        <div className="glass-card p-12 text-center">
                            <div className="text-6xl mb-4">📦</div>
                            <h3 className="text-2xl font-bold text-gray-800 mb-2">No hay productos</h3>
                            <p className="text-gray-600 mb-6">
                                Agrega URLs de Mercado Libre para comenzar el seguimiento
                            </p>
                            <button
                                onClick={() => setAddUrlModal(true)}
                                className="bg-gradient-to-r from-blue-500 to-purple-600 text-white px-8 py-3 rounded-lg hover:shadow-lg transition-all font-medium"
                            >
                                ➕ Agregar Primer Producto
                            </button>
                        </div>
                    )}

                    {/* Product Detail Modal */}
                    {selectedProduct && (
                        <ProductDetailModal
                            product={selectedProduct}
                            onClose={() => setSelectedProduct(null)}
                        />
                    )}

                    {/* Add URL Modal */}
                    {addUrlModal && (
                        <AddUrlModal
                            onClose={() => setAddUrlModal(false)}
                            onSuccess={() => {
                                setAddUrlModal(false);
                                refetchProducts();
                            }}
                        />
                    )}
                </div>
            );
        }

        // Componente de tarjeta de estadísticas
        function StatsCard({ icon, title, value, color, pulse }) {
            const colors = {
                blue: 'from-blue-500 to-blue-600',
                green: 'from-green-500 to-green-600',
                red: 'from-red-500 to-red-600',
                orange: 'from-orange-500 to-orange-600'
            };

            return (
                <div className={`glass-card p-6 bg-gradient-to-br ${colors[color]}`}>
                    <div className="flex items-center justify-between">
                        <div>
                            <p className="text-white opacity-90 text-sm mb-1">{title}</p>
                            <p className={`text-3xl font-bold text-white ${pulse ? 'pulse-animation' : ''}`}>
                                {value}
                            </p>
                        </div>
                        <div className="text-4xl">{icon}</div>
                    </div>
                </div>
            );
        }

        // Componente de alerta
        function Alert({ alert }) {
            const getBgColor = () => {
                if (alert.alert_type === 'price_drop') return 'bg-green-100 border-green-400';
                if (alert.alert_type === 'out_of_stock') return 'bg-orange-100 border-orange-400';
                return 'bg-blue-100 border-blue-400';
            };

            return (
                <div className={`p-4 rounded-lg border-l-4 ${getBgColor()}`}>
                    <div className="flex items-center justify-between">
                        <p className="font-medium text-gray-800">{alert.message}</p>
                        <span className="text-xs text-gray-500">
                            {new Date(alert.triggered_at).toLocaleString('es-CL')}
                        </span>
                    </div>
                </div>
            );
        }

        // Botón de filtro
        function FilterButton({ active, onClick, label }) {
            return (
                <button
                    onClick={onClick}
                    className={`px-4 py-2 rounded-lg font-medium transition-all ${
                        active
                            ? 'bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg'
                            : 'bg-white text-gray-700 hover:bg-gray-100'
                    }`}
                >
                    {label}
                </button>
            );
        }

        // Tarjeta de producto
        function ProductCard({ product, onSelect }) {
            const imageUrl = product.image_url || 'https://via.placeholder.com/300x300/667eea/ffffff?text=Sin+Imagen';
            
            return (
                <div className="glass-card p-4 hover:shadow-2xl transition-all cursor-pointer" onClick={onSelect}>
                    <div className="relative mb-4">
                        <img
                            src={imageUrl}
                            alt={product.title}
                            className="w-full h-48 object-cover rounded-lg"
                            onError={(e) => {
                                e.target.src = 'https://via.placeholder.com/300x300/667eea/ffffff?text=Sin+Imagen';
                            }}
                        />
                        {product.discount_percentage > 0 && (
                            <div className="absolute top-2 right-2 bg-red-500 text-white px-3 py-1 rounded-full font-bold">
                                -{product.discount_percentage.toFixed(0)}%
                            </div>
                        )}
                        {!product.stock_available && (
                            <div className="absolute top-2 left-2 bg-gray-800 text-white px-3 py-1 rounded-full text-sm">
                                Sin Stock
                            </div>
                        )}
                    </div>

                    <h3 className="font-bold text-gray-800 mb-2 line-clamp-2 h-12">
                        {product.title}
                    </h3>

                    <div className="mb-3">
                        {product.original_price && (
                            <p className="text-gray-400 line-through text-sm">
                                ${product.original_price.toLocaleString('es-CL')}
                            </p>
                        )}
                        <p className="text-2xl font-bold text-purple-600">
                            ${product.price.toLocaleString('es-CL')}
                        </p>
                    </div>

                    <div className="flex items-center justify-between text-sm text-gray-600 mb-3">
                        <div className="flex items-center gap-1">
                            {product.rating && (
                                <>
                                    <span>⭐ {product.rating}</span>
                                    <span className="text-gray-400">({product.reviews_count})</span>
                                </>
                            )}
                        </div>
                        <div>
                            {product.free_shipping && <span className="text-green-600">🚚 Gratis</span>}
                        </div>
                    </div>

                    <div className="flex items-center justify-between text-xs text-gray-500 pt-3 border-t">
                        <span className="font-medium truncate max-w-[60%]">{product.seller_name}</span>
                        {product.seller_reputation && (
                            <span className="bg-yellow-100 px-2 py-1 rounded">{product.seller_reputation}</span>
                        )}
                    </div>
                </div>
            );
        }

        // Modal de detalle del producto
        function ProductDetailModal({ product, onClose }) {
            const { data: history, loading } = useApi(`/products/${product.product_id}/history`);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartRef.current && history && history.length > 0) {
                    const ctx = chartRef.current.getContext('2d');
                    
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: history.map(h => new Date(h.timestamp).toLocaleDateString('es-CL')),
                            datasets: [{
                                label: 'Precio',
                                data: history.map(h => h.price),
                                borderColor: 'rgb(147, 51, 234)',
                                backgroundColor: 'rgba(147, 51, 234, 0.1)',
                                tension: 0.4,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { display: false },
                                title: {
                                    display: true,
                                    text: 'Historial de Precios'
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: false,
                                    ticks: {
                                        callback: function(value) {
                                            return '$' + value.toLocaleString('es-CL');
                                        }
                                    }
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [history]);

            const imageUrl = product.image_url || 'https://via.placeholder.com/400x400/667eea/ffffff?text=Sin+Imagen';

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={onClose}>
                    <div className="glass-card max-w-4xl w-full max-h-[90vh] overflow-y-auto p-8" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-start mb-6">
                            <h2 className="text-2xl font-bold text-gray-800 pr-8">{product.title}</h2>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-800 text-3xl leading-none">
                                ×
                            </button>
                        </div>

                        <div className="grid md:grid-cols-2 gap-8">
                            <div>
                                <img
                                    src={imageUrl}
                                    alt={product.title}
                                    className="w-full rounded-lg mb-4"
                                    onError={(e) => {
                                        e.target.src = 'https://via.placeholder.com/400x400/667eea/ffffff?text=Sin+Imagen';
                                    }}
                                />
                                
                                <div className="space-y-3">
                                    <InfoRow label="Vendedor" value={product.seller_name} />
                                    {product.seller_reputation && (
                                        <InfoRow 
                                            label="Reputación" 
                                            value={<span className="bg-yellow-100 px-3 py-1 rounded">{product.seller_reputation}</span>} 
                                        />
                                    )}
                                    {product.sales_count && (
                                        <InfoRow label="Ventas" value={`${product.sales_count} vendidos`} />
                                    )}
                                    {product.rating && (
                                        <InfoRow label="Rating" value={`⭐ ${product.rating}/5 (${product.reviews_count} reseñas)`} />
                                    )}
                                    <InfoRow 
                                        label="Stock" 
                                        value={
                                            <span className={product.stock_available ? 'text-green-600' : 'text-red-600'}>
                                                {product.stock_available ? '✓ Disponible' : '✗ Sin stock'}
                                            </span>
                                        } 
                                    />
                                    <InfoRow 
                                        label="Envío" 
                                        value={
                                            <span className={product.free_shipping ? 'text-green-600' : 'text-gray-500'}>
                                                {product.free_shipping ? '🚚 Gratis' : 'Con costo'}
                                            </span>
                                        } 
                                    />
                                </div>

                                <a 
                                    href={product.url} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="mt-4 block w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white text-center py-3 rounded-lg hover:shadow-lg transition-all font-medium"
                                >
                                    Ver en Mercado Libre →
                                </a>
                            </div>

                            <div>
                                <div className="mb-6">
                                    {product.original_price && (
                                        <p className="text-gray-400 line-through text-lg mb-1">
                                            ${product.original_price.toLocaleString('es-CL')}
                                        </p>
                                    )}
                                    <p className="text-4xl font-bold text-purple-600 mb-2">
                                        ${product.price.toLocaleString('es-CL')}
                                    </p>
                                    {product.discount_percentage > 0 && (
                                        <div className="inline-block bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold">
                                            Ahorro: {product.discount_percentage.toFixed(0)}% 
                                            (${(product.original_price - product.price).toLocaleString('es-CL')})
                                        </div>
                                    )}
                                </div>

                                {loading ? (
                                    <div className="flex items-center justify-center h-64">
                                        <div className="loading-spinner"></div>
                                    </div>
                                ) : history && history.length > 0 ? (
                                    <>
                                        <div className="bg-white p-4 rounded-lg mb-6">
                                            <canvas ref={chartRef}></canvas>
                                        </div>

                                        <div className="space-y-2">
                                            <h3 className="font-bold text-gray-800 mb-3">📊 Análisis de Precio</h3>
                                            <PriceAnalysisCard 
                                                label="Precio mínimo"
                                                value={Math.min(...history.map(h => h.price))}
                                                color="blue"
                                            />
                                            <PriceAnalysisCard 
                                                label="Precio máximo"
                                                value={Math.max(...history.map(h => h.price))}
                                                color="purple"
                                            />
                                            <PriceAnalysisCard 
                                                label="Precio promedio"
                                                value={history.reduce((sum, h) => sum + h.price, 0) / history.length}
                                                color="green"
                                            />
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-8 text-gray-500">
                                        No hay historial de precios disponible
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function InfoRow({ label, value }) {
            return (
                <div className="flex justify-between items-center">
                    <span className="text-gray-600">{label}:</span>
                    <span className="font-medium">{value}</span>
                </div>
            );
        }

        function PriceAnalysisCard({ label, value, color }) {
            const colors = {
                blue: 'bg-blue-50',
                purple: 'bg-purple-50',
                green: 'bg-green-50'
            };

            return (
                <div className={`${colors[color]} p-3 rounded-lg`}>
                    <p className="text-sm text-gray-700">
                        {label}: <span className="font-bold">${value.toLocaleString('es-CL', {maximumFractionDigits: 0})}</span>
                    </p>
                </div>
            );
        }

        // Modal para agregar URL
        function AddUrlModal({ onClose, onSuccess }) {
            const [url, setUrl] = useState('');
            const [category, setCategory] = useState('Electrónica');
            const [description, setDescription] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');

                if (!url || !url.includes('mercadolibre.cl')) {
                    setError('URL inválida. Debe ser de mercadolibre.cl');
                    return;
                }

                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE}/tracked-urls`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url, category, description })
                    });
                    const json = await response.json();
                    
                    if (json.success) {
                        onSuccess();
                    } else {
                        setError(json.error || 'Error al agregar URL');
                    }
                } catch (err) {
                    setError('Error de conexión');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={onClose}>
                    <div className="glass-card max-w-md w-full p-8" onClick={e => e.stopPropagation()}>
                        <h2 className="text-2xl font-bold text-gray-800 mb-6">➕ Agregar Producto</h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    URL del Producto *
                                </label>
                                <input
                                    type="text"
                                    value={url}
                                    onChange={(e) => setUrl(e.target.value)}
                                    placeholder="https://www.mercadolibre.cl/..."
                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Categoría *
                                </label>
                                <select
                                    value={category}
                                    onChange={(e) => setCategory(e.target.value)}
                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500"
                                >
                                    <option value="Electrónica">Electrónica</option>
                                    <option value="Electrodomésticos">Electrodomésticos</option>
                                    <option value="Deportes">Deportes</option>
                                    <option value="Hogar">Hogar</option>
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Descripción (opcional)
                                </label>
                                <input
                                    type="text"
                                    value={description}
                                    onChange={(e) => setDescription(e.target.value)}
                                    placeholder="Ej: Notebook para trabajo"
                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500"
                                />
                            </div>

                            {error && (
                                <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                                    {error}
                                </div>
                            )}

                            <div className="flex gap-3">
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="flex-1 px-6 py-3 border-2 border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 transition-all font-medium"
                                >
                                    Cancelar
                                </button>
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="flex-1 bg-gradient-to-r from-blue-500 to-purple-600 text-white px-6 py-3 rounded-lg hover:shadow-lg transition-all font-medium disabled:opacity-50"
                                >
                                    {loading ? 'Agregando...' : 'Agregar'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // Renderizar la aplicación
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
